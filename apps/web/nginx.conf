# Solo estáticos + shell SPA. En Dokploy/Traefik, /api va al servicio theforge-api (no pasa por este nginx).
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Chunks con hash de Vite: nunca devolver el shell SPA si falta un archivo (evita MIME text/html en .js).
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Evita que el navegador conserve un index.html viejo que referencie chunks ya borrados en un deploy nuevo.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Default browser request; without a real .ico file, try_files would serve index.html (wrong MIME).
  location = /favicon.ico {
    alias /usr/share/nginx/html/favicon.svg;
    default_type image/svg+xml;
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
