# Imagen monolítica (API + estáticos en un solo contenedor): proxy /api → localhost:3000.
# Stack Dokploy separado: usar apps/web/nginx.conf (solo estáticos) + Traefik hacia theforge-api.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location = /favicon.ico {
    alias /usr/share/nginx/html/favicon.svg;
    default_type image/svg+xml;
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
